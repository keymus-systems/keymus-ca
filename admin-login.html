<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Keymus</title>
    <link rel="shortcut icon" href="assets/uploads/keymus/keymus-logo.jpg" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 1rem;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 2rem;
            text-align: center;
            color: white;
        }
        .login-header .logo {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            margin-bottom: 0.75rem;
        }
        .login-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        .login-header p {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .login-body {
            padding: 2rem;
        }
        .form-floating {
            margin-bottom: 1rem;
        }
        .form-floating .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            height: 56px;
            font-size: 1rem;
        }
        .form-floating .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }
        .btn-login {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            border: none;
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            color: white;
        }
        .btn-login:disabled {
            opacity: 0.7;
            transform: none;
        }
        .alert {
            border-radius: 10px;
            font-size: 0.9rem;
        }
        .setup-form { display: none; }
        .password-wrapper {
            position: relative;
            margin-bottom: 1rem;
        }
        .password-wrapper .form-floating {
            margin-bottom: 0;
        }
        .password-wrapper .form-floating .form-control {
            padding-right: 3rem;
        }
        .btn-toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6c757d;
            cursor: pointer;
            padding: 4px 6px;
            line-height: 1;
            z-index: 10;
            transition: color 0.2s;
        }
        .btn-toggle-password:hover {
            color: #0d6efd;
        }
        .login-footer {
            text-align: center;
            padding: 0 2rem 1.5rem;
        }
        .login-footer a {
            color: #0d6efd;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .login-footer a:hover {
            text-decoration: underline;
        }
        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
            border-width: 0.15em;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/uploads/keymus/keymus-logo.jpg" alt="Keymus" class="logo">
                <h1 id="formTitle">Admin Login</h1>
                <p id="formSubtitle">Sign in to the admin dashboard</p>
            </div>
            
            <div class="login-body">
                <!-- Alert -->
                <div class="alert d-none" id="alertBox" role="alert"></div>

                <!-- Login Form -->
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-floating">
                        <input type="text" class="form-control" id="loginUsername" placeholder="Username" required autocomplete="username">
                        <label for="loginUsername"><i class="fas fa-user me-1"></i> Username</label>
                    </div>
                    <div class="password-wrapper">
                        <div class="form-floating">
                            <input type="password" class="form-control" id="loginPassword" placeholder="Password" required autocomplete="current-password">
                            <label for="loginPassword"><i class="fas fa-lock me-1"></i> Password</label>
                        </div>
                        <button type="button" class="btn-toggle-password" onclick="togglePasswordVisibility('loginPassword', this)" tabindex="-1" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <button type="submit" class="btn btn-login" id="loginBtn">
                        <i class="fas fa-sign-in-alt me-1"></i> Sign In
                    </button>
                </form>

                <!-- Setup Form (shown only when no admin exists) -->
                <form id="setupForm" class="setup-form" onsubmit="handleSetup(event)">
                    <div class="form-floating">
                        <input type="text" class="form-control" id="setupDisplayName" placeholder="Display Name" required>
                        <label for="setupDisplayName"><i class="fas fa-id-badge me-1"></i> Display Name</label>
                    </div>
                    <div class="form-floating">
                        <input type="email" class="form-control" id="setupEmail" placeholder="Email (optional)">
                        <label for="setupEmail"><i class="fas fa-envelope me-1"></i> Email (optional)</label>
                    </div>
                    <div class="form-floating">
                        <input type="text" class="form-control" id="setupUsername" placeholder="Username" required autocomplete="username">
                        <label for="setupUsername"><i class="fas fa-user me-1"></i> Choose Username</label>
                    </div>
                    <div class="form-floating">
                        <input type="password" class="form-control" id="setupPassword" placeholder="Password" required minlength="6" autocomplete="new-password">
                        <label for="setupPassword"><i class="fas fa-lock me-1"></i> Choose Password (min 6 chars)</label>
                    </div>
                    <button type="submit" class="btn btn-login" id="setupBtn">
                        <i class="fas fa-user-plus me-1"></i> Create Admin Account
                    </button>
                </form>
            </div>
            
            <div class="login-footer">
                <a href="home.html"><i class="fas fa-arrow-left me-1"></i> Back to Website</a>
            </div>
        </div>
    </div>

    <script>
        const CHAT_API = window.KEYMUS_CHAT_URL || 'http://localhost:3001';

        // Check if admin exists on load
        document.addEventListener('DOMContentLoaded', async function() {
            // Check if already logged in
            const existingToken = localStorage.getItem('admin_auth_token');
            if (existingToken) {
                try {
                    const resp = await fetch(`${CHAT_API}/api/admin/auth/me`, {
                        headers: { 'Authorization': `Bearer ${existingToken}` }
                    });
                    if (resp.ok) {
                        window.location.href = 'admin-chat.html';
                        return;
                    }
                    // Token expired, remove it
                    localStorage.removeItem('admin_auth_token');
                } catch (e) { /* ignore */ }
            }

            // Check if setup is needed
            try {
                const resp = await fetch(`${CHAT_API}/api/admin/auth/check`);
                const data = await resp.json();
                
                if (data.needsSetup) {
                    showSetupForm();
                }
            } catch (err) {
                showAlert('danger', 'Cannot connect to chat server. Make sure it is running on port 3001.');
            }
        });

        function showSetupForm() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('setupForm').style.display = 'block';
            document.getElementById('formTitle').textContent = 'Create Admin Account';
            document.getElementById('formSubtitle').textContent = 'Set up your first admin account';
        }

        function showAlert(type, message) {
            const alert = document.getElementById('alertBox');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = message;
            alert.classList.remove('d-none');
        }

        function hideAlert() {
            document.getElementById('alertBox').classList.add('d-none');
        }

        function setLoading(btn, loading) {
            if (loading) {
                btn.disabled = true;
                btn.dataset.originalHtml = btn.innerHTML;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Please wait...';
            } else {
                btn.disabled = false;
                btn.innerHTML = btn.dataset.originalHtml;
            }
        }

        function togglePasswordVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            hideAlert();
            
            const btn = document.getElementById('loginBtn');
            setLoading(btn, true);

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            try {
                const resp = await fetch(`${CHAT_API}/api/admin/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await resp.json();

                if (!resp.ok) {
                    showAlert('danger', `<i class="fas fa-exclamation-circle me-1"></i> ${data.error}`);
                    setLoading(btn, false);
                    return;
                }

                // Store token and redirect
                localStorage.setItem('admin_auth_token', data.token);
                // Do NOT store as auth_token — that would cause the chat widget on
                // regular pages to connect to /chat as the admin user, hiding client messages.
                showAlert('success', '<i class="fas fa-check-circle me-1"></i> Login successful! Redirecting...');
                
                setTimeout(() => {
                    window.location.href = 'admin-chat.html';
                }, 500);
            } catch (err) {
                showAlert('danger', 'Cannot connect to server. Please try again.');
                setLoading(btn, false);
            }
        }

        async function handleSetup(e) {
            e.preventDefault();
            hideAlert();
            
            const btn = document.getElementById('setupBtn');
            setLoading(btn, true);

            const displayName = document.getElementById('setupDisplayName').value.trim();
            const email = document.getElementById('setupEmail').value.trim();
            const username = document.getElementById('setupUsername').value.trim();
            const password = document.getElementById('setupPassword').value;

            if (password.length < 6) {
                showAlert('danger', 'Password must be at least 6 characters');
                setLoading(btn, false);
                return;
            }

            try {
                const resp = await fetch(`${CHAT_API}/api/admin/auth/setup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, displayName, email })
                });

                const data = await resp.json();

                if (!resp.ok) {
                    showAlert('danger', `<i class="fas fa-exclamation-circle me-1"></i> ${data.error}`);
                    setLoading(btn, false);
                    return;
                }

                // Store token and redirect
                localStorage.setItem('admin_auth_token', data.token);
                // Do NOT store as auth_token — that would cause the chat widget on
                // regular pages to connect to /chat as the admin user, hiding client messages.
                showAlert('success', '<i class="fas fa-check-circle me-1"></i> Admin account created! Redirecting...');
                
                setTimeout(() => {
                    window.location.href = 'admin-chat.html';
                }, 500);
            } catch (err) {
                showAlert('danger', 'Cannot connect to server. Please try again.');
                setLoading(btn, false);
            }
        }
    </script>
</body>
</html>
